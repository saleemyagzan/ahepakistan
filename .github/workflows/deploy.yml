name: Build and Deploy AHE Pakistan (test subdomain)

on:
  push:
    branches: [main, master]
    paths:
      - "ahepakistan/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ahepakistan/package-lock.json

      - name: Install dependencies
        working-directory: ahepakistan
        run: npm ci

      - name: Build
        working-directory: ahepakistan
        run: npm run build

      - name: Deploy to Hostinger (test.ahepakistan.org) via lftp
        working-directory: ahepakistan
        env:
          LFTP_USER: ${{ secrets.FTP_USERNAME }}
          LFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          LFTP_HOST: ${{ secrets.FTP_SERVER }}
          LFTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          cat > /tmp/deploy.lftp <<SCRIPT
          set ftp:ssl-allow no
          set net:max-retries 5
          set net:timeout 20
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          open -u "$LFTP_USER","$LFTP_PASS" "$LFTP_HOST"
          mirror -R --delete --verbose --parallel=2 ./dist/ "$LFTP_DIR"
          bye
          SCRIPT
          lftp -f /tmp/deploy.lftp
