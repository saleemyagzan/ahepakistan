name: Build and Deploy AHE Pakistan (test subdomain)

on:
  push:
    branches: [main, master]
    paths:
      - "ahepakistan/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ahepakistan/package-lock.json

      - name: Install dependencies
        working-directory: ahepakistan
        run: npm ci

      - name: Build
        working-directory: ahepakistan
        run: npm run build

      - name: Deploy to Hostinger (test.ahepakistan.org) via rsync over SSH
        working-directory: ahepakistan
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -o pipefail -e

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 145.79.58.152 >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
          TARGET="/home/u901645794/domains/test.ahepakistan.org/public_html/"
          REMOTE="u901645794@145.79.58.152"

          echo "----- Syncing files to server (rsync -avz --delete over SSH) -----"
          rsync -avz --delete -e "$SSH_CMD" ./dist/ "$REMOTE:$TARGET"

          # Verify the deploy actually landed by md5-comparing the local build's
          # index.html against the copy now on the server. This guards against the
          # "reports success but uploaded nothing" failures we hit with FTP/lftp —
          # if the hashes don't match, fail the job loudly rather than silently.
          REMOTE_INDEX_HASH=$($SSH_CMD "$REMOTE" "md5sum '${TARGET}index.html' 2>/dev/null | cut -d' ' -f1" || echo "")
          LOCAL_INDEX_HASH=$(md5sum ./dist/index.html | cut -d' ' -f1)
          echo "Local index.html md5:  $LOCAL_INDEX_HASH"
          echo "Remote index.html md5: $REMOTE_INDEX_HASH"

          if [ "$LOCAL_INDEX_HASH" != "$REMOTE_INDEX_HASH" ]; then
            echo "::error::index.html on server does not match this build after rsync."
            exit 1
          fi
          echo "----- Verified: server matches this build exactly -----"

          # NOTE: test.ahepakistan.org is fronted by Hostinger's CDN (ALIAS ->
          # cdn.hstgr.net). The CDN auto-clears every ~30 min, so changes appear
          # within that window automatically. For an immediate refresh, purge via
          # hPanel -> Cache Manager -> Purge All, or disable Automatic cache on the
          # test subdomain so deploys show instantly.
          echo "Deploy complete. If the live site looks stale, purge the CDN cache in hPanel (auto-clears within ~30 min)."
