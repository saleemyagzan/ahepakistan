name: Build and Deploy AHE Pakistan (test subdomain)

on:
  push:
    branches: [main, master]
    paths:
      - "ahepakistan/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ahepakistan/package-lock.json

      - name: Install dependencies
        working-directory: ahepakistan
        run: npm ci

      - name: Build
        working-directory: ahepakistan
        run: npm run build

      - name: Deploy to Hostinger (test.ahepakistan.org) via lftp
        working-directory: ahepakistan
        env:
          LFTP_USER: ${{ secrets.FTP_USERNAME }}
          LFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          LFTP_HOST: ${{ secrets.FTP_SERVER }}
          LFTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -o pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          cat > /tmp/deploy.lftp <<SCRIPT
          set cmd:fail-exit true
          set ftp:ssl-allow no
          set ftp:passive-mode true
          set net:max-retries 5
          set net:timeout 20
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set xfer:log yes
          set xfer:log-file /tmp/lftp-xfer.log
          open -u "$LFTP_USER","$LFTP_PASS" "$LFTP_HOST"
          pwd
          cd "$LFTP_DIR"
          pwd
          ls
          mirror -R --delete --verbose=3 --parallel=2 ./dist/ .
          bye
          SCRIPT

          lftp -f /tmp/deploy.lftp 2>&1 | tee /tmp/lftp-session.log

          echo "----- Transfer log -----"
          if [ -f /tmp/lftp-xfer.log ]; then
            cat /tmp/lftp-xfer.log
            UPLOAD_COUNT=$(grep -c '^put ' /tmp/lftp-xfer.log)
          else
            echo "(no transfer log produced)"
            UPLOAD_COUNT=0
          fi
          echo "----- Files actually uploaded: $UPLOAD_COUNT -----"

          if [ "$UPLOAD_COUNT" -eq 0 ]; then
            echo "::error::lftp reported success but uploaded 0 files — connection/login worked but transfers did not happen. See job log above for the pwd/ls diagnostic output and full session log."
            exit 1
          fi
