name: Build and Deploy AHE Pakistan (test subdomain)

on:
  push:
    branches: [main, master]
    paths:
      - "ahepakistan/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ahepakistan/package-lock.json

      - name: Install dependencies
        working-directory: ahepakistan
        run: npm ci

      - name: Build
        working-directory: ahepakistan
        run: npm run build

      - name: Deploy to Hostinger (test.ahepakistan.org) via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ahepakistan/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # The real bug behind stale deploys was FTP_SERVER_DIR pointing to
          # public_html/ when the FTP account is already chrooted into
          # public_html on login — every upload silently landed in a nested
          # public_html/public_html/ that the live site never served. Now
          # that server-dir is corrected to /, incremental sync (the default,
          # faster and less prone to FTP timeouts on shared hosting) is safe
          # to use again — clean-slate isn't needed.
          dangerous-clean-slate: false
          log-level: verbose
