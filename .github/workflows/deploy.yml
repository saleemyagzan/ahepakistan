name: Build and Deploy AHE Pakistan (test subdomain)

on:
  push:
    branches: [main, master]
    paths:
      - "ahepakistan/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ahepakistan/package-lock.json

      - name: Install dependencies
        working-directory: ahepakistan
        run: npm ci

      - name: Build
        working-directory: ahepakistan
        run: npm run build

      - name: Deploy to Hostinger (test.ahepakistan.org) via rsync over SSH
        working-directory: ahepakistan
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -o pipefail -e

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 145.79.58.152 >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
          TARGET="/home/u901645794/domains/test.ahepakistan.org/public_html/"
          REMOTE="u901645794@145.79.58.152"

          echo "----- Pre-deploy diagnostic -----"
          $SSH_CMD "$REMOTE" "echo Connected as: \$(whoami); echo Home: \$(pwd); echo Target listing:; ls -la '$TARGET' 2>&1 | head -15" || true

          echo "----- Syncing files (rsync -avz --delete) -----"
          rsync -avz --delete -e "$SSH_CMD" ./dist/ "$REMOTE:$TARGET"

          echo "----- Post-deploy verification -----"
          $SSH_CMD "$REMOTE" "ls -la '$TARGET' | head -20" || true

          REMOTE_INDEX_HASH=$($SSH_CMD "$REMOTE" "md5sum '${TARGET}index.html' 2>/dev/null | cut -d' ' -f1" || echo "")
          LOCAL_INDEX_HASH=$(md5sum ./dist/index.html | cut -d' ' -f1)
          echo "Local index.html md5:  $LOCAL_INDEX_HASH"
          echo "Remote index.html md5: $REMOTE_INDEX_HASH"

          if [ -z "$REMOTE_INDEX_HASH" ]; then
            echo "::error::index.html not found on remote after rsync — sync did not reach $TARGET"
            exit 1
          fi

          if [ "$LOCAL_INDEX_HASH" != "$REMOTE_INDEX_HASH" ]; then
            echo "::error::index.html md5 mismatch after rsync — local and remote differ. Sync ran but content doesn't match."
            exit 1
          fi

          echo "----- Verified: remote index.html matches this build exactly -----"
